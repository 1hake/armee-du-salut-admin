name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: thegobc/ads:latest
          target: production
          no-cache: true

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY_NOPW }}
          source: './docker-compose.yml,./docker-compose.swarm.yml'
          target: '~/ads/'

      - name: Deploy to Docker Swarm
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY_NOPW }}
          script: |
            set -e

            cd ads

            # Create webnet if it doesn't exist
            if ! docker network ls --format "{{.Name}}" | grep -q "^webnet$"; then
                docker network create --driver overlay --attachable webnet
            fi

            # Deploy stack
            docker stack deploy -c docker-compose.yml -c docker-compose.swarm.yml --with-registry-auth ads

            # Wait for deployment to process
            sleep 5

            # Force update service with latest image
            docker service update --image thegobc/ads:latest --force --with-registry-auth ads_app
