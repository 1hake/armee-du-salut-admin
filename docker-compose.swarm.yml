# Production Swarm configuration
services:
  app:
    image: thegobc/ads:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: stop-first
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.ads.rule=Host(`ads.gobc.fr`)'
      - 'traefik.http.routers.ads.entrypoints=websecure'
      - 'traefik.http.routers.ads.tls.certresolver=myresolver'
      - 'traefik.http.services.ads.loadbalancer.server.port=3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    volumes:
      - sqlite-data:/app/sqlite-data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - webnet

volumes:
  sqlite-data:

networks:
  webnet:
    external: true
